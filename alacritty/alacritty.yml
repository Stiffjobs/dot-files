font:
  size: 17
  offset:
    y: 16
  glyph_offset:
    y: 9
  normal:
    family: "Hack Nerd Font Mono"
window:
  padding:
    x: 5
    y: 5
  dimensions:
    columns: 90
    lines: 30
  opacity: 0.98
  decorations: buttonless

cursor:
  unfocused_hollow: true
  style:
    blinking: Never

shell:
  program: /bin/zsh
  args:
    - -l
    - -c
    - "tmux"
  key_bindings:
    - { key: V, mods: Control|Shift, action: Paste }
    - { key: C, mods: Control|Shift, action: Copy }
    - { key: Key0, mods: Control, action: ResetFontSize }
    - { key: Equals, mods: Control, action: IncreaseFontSize }
    - { key: Add, mods: Control, action: IncreaseFontSize }
    - { key: Subtract, mods: Control, action: DecreaseFontSize }
    - { key: Minus, mods: Control, action: DecreaseFontSize }
    - { key: N, mods: Control, action: SpawnNewInstance }

env:
  TERM: xterm-256color

scrolling:
  history: 2000
  auto_scroll: true
theme: Atelierseaside.dark

colors:
  name: Atelierseaside (dark)
  author: Chris Kempson
  primary:
    background: "#131513"
    foreground: "#8ca68c"
  cursor:
    text: "#131513"
    cursor: "#8ca68c"
  normal:
    black: "#131513"
    red: "#e6193c"
    green: "#29a329"
    yellow: "#c3c322"
    blue: "#3d62f5"
    magenta: "#ad2bee"
    cyan: "#1999b3"
    white: "#8ca68c"
  bright:
    black: "#687d68"
    red: "#e6193c"
    green: "#29a329"
    yellow: "#c3c322"
    blue: "#3d62f5"
    magenta: "#ad2bee"
    cyan: "#1999b3"
    white: "#f0fff0"
